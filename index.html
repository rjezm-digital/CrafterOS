<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraftOS – Print Cost Calculator</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="css/main.css">

  <!-- Dashboard Theme -->
  <style>
    :root{
      --bg-main:#020617;
      --bg-card:#0f172a;
      --bg-soft:#111827;
      --border:rgba(56,189,248,.25);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --primary:linear-gradient(135deg,#22d3ee,#3b82f6);
      --radius-lg:18px;
      --radius-md:14px;
    }
    body{
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      background:radial-gradient(circle at top,#0f172a,#020617);
      color:var(--text);
    }
    .dashboard-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:1.25rem 2rem;
      border-bottom:1px solid #1e293b;
    }
    .brand h1{margin:0;font-size:1.1rem}
    .brand span{font-size:.8rem;color:var(--muted)}
    .btn{border:none;border-radius:999px;padding:.45rem .9rem;cursor:pointer}
    .btn.ghost{background:transparent;color:var(--muted)}
    .btn.danger{background:#7f1d1d;color:#fecaca}
    .kpi-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:1rem;
      padding:1.5rem 2rem;
    }
    .kpi-card{
      background:var(--bg-card);
      border-radius:var(--radius-lg);
      padding:1.25rem;
      border:1px solid var(--border);
    }
    .kpi-card span{font-size:.8rem;color:var(--muted)}
    .kpi-card strong{display:block;font-size:1.4rem}
    .tab-nav{
      display:flex;
      gap:.75rem;
      padding:0 2rem;
    }
    .tab{
      background:var(--bg-soft);
      border-radius:999px;
      padding:.6rem 1.2rem;
      border:none;
      color:var(--muted);
      cursor:pointer;
    }
    .tab.active{
      background:var(--primary);
      color:#020617;
      font-weight:600;
    }
    .content{padding:1.5rem 2rem}
    .content-card{
      background:var(--bg-card);
      border-radius:var(--radius-lg);
      border:1px solid var(--border);
      padding:1.5rem;
    }
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    @media(max-width:900px){
      .kpi-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>

<body>

<header class="dashboard-header">
  <div class="brand">
    <h1>RJEZM DIGITAL</h1>
    <span>Print Cost Calculator</span>
  </div>
  <div>
    <button class="btn ghost">Change Password</button>
    <button class="btn danger">Logout</button>
  </div>
</header>

<section class="kpi-grid">
  <div class="kpi-card"><span>Materials</span><strong>0</strong></div>
  <div class="kpi-card"><span>Costing Items</span><strong>0</strong></div>
  <div class="kpi-card"><span>Products</span><strong>0</strong></div>
  <div class="kpi-card"><span>Revenue</span><strong>₱0.00</strong></div>
</section>

<nav class="tab-nav">
  <button class="tab" data-tab="materials">Materials</button>
  <button class="tab active" data-tab="costing">Costing</button>
  <button class="tab" data-tab="calculator">Calculator</button>
  <button class="tab" data-tab="receipt">Receipt</button>
</nav>

<main class="content">

  <!-- MATERIALS -->
  <section class="content-card tab-panel" data-panel="materials">
    <h2>Materials</h2>
    <p style="color:var(--muted)">Coming soon</p>
  </section>

  <!-- COSTING -->
  <section class="content-card tab-panel active" data-panel="costing">
    <h2>Costing Presets</h2>

    <div class="grid-2">
      <div class="form-group">
        <label>Paper Cost (₱/sheet)</label>
        <input type="number" id="presetPaperCost">
      </div>
      <div class="form-group">
        <label>Labor Cost (₱)</label>
        <input type="number" id="presetLaborCost">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>Profit Margin (%)</label>
        <input type="number" id="presetProfitMargin" value="30">
      </div>
      <div class="form-group">
        <label>Electricity Rate (₱/kWh)</label>
        <input type="number" id="presetKwhRate" value="11">
      </div>
    </div>

    <button class="primary-btn" id="applyCostingBtn">Apply to Calculator</button>
    <button class="btn ghost" id="saveCostingBtn">Save Defaults</button>
  </section>

  <!-- CALCULATOR -->
  <section class="content-card tab-panel" data-panel="calculator">
    <h2>Print Cost Calculator</h2>

    <label>Quantity</label>
    <input type="number" id="quantity">

    <label>Paper Cost</label>
    <input type="number" id="paperCost">

    <label>Paper Stock</label>
    <input type="number" id="paperStock">

    <label>Labor Cost</label>
    <input type="number" id="laborCost">

    <label>Profit Margin (%)</label>
    <input type="number" id="profitMargin">

    <div id="inventoryWarning"></div>
    <div>Total Cost: <span id="totalCost">₱0.00</span></div>
  </section>

  <!-- RECEIPT -->
  <section class="content-card tab-panel" data-panel="receipt">
    <h2>Receipt</h2>

    <p>Job Ref: <span id="jobRef"></span></p>
    <p>Date: <span id="jobDate"></span></p>

    <p>Qty: <span id="rQty"></span></p>
    <p>Paper: <span id="rPaper"></span></p>
    <p>Ink: <span id="rInk"></span></p>
    <p>Electricity: <span id="rElectricity"></span></p>
    <p>Labor: <span id="rLabor"></span></p>

    <p>Base: <span id="rBase"></span></p>
    <p>Profit: <span id="rProfit"></span></p>
    <p>Total: <span id="rTotal"></span></p>

    <button id="printBtn">Print</button>
  </section>

</main>

<!-- JS -->
<script src="js/cmyk.js"></script>
<script src="js/electricity.js"></script>
<script src="js/inventory.js"></script>
<script src="js/receipt.js"></script>
<script src="js/calculator.js"></script>
<script type="module" src="js/firebase.js"></script>
<script src="js/app.js"></script>

</body>
</html>
